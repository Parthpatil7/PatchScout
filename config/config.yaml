# PatchScout Configuration File

# Model Settings
model:
  type: "transformer"  # Options: transformer, llm_api, hybrid
  name: "microsoft/codebert-base"
  max_length: 512
  batch_size: 16
  device: "cuda"  # Options: cuda, cpu, mps

# LLM API Settings (if using OpenAI, Claude, etc.)
llm_api:
  provider: "openai"  # Options: openai, anthropic, cohere
  model: "gpt-4"
  api_key_env: "OPENAI_API_KEY"
  temperature: 0.2
  max_tokens: 2000

# Supported Languages (Stage I)
languages:
  stage_1:
    - java
    - python
    - c
    - cpp
    - csharp
    - php
  stage_2:
    - ruby
    - rust
    - kotlin
    - swift
    - html
    - javascript
    - go

# Vulnerability Categories
vulnerabilities:
  owasp_top_10:
    - "Broken Access Control"
    - "Cryptographic Failures"
    - "Injection"
    - "Insecure Design"
    - "Security Misconfiguration"
    - "Vulnerable and Outdated Components"
    - "Identification and Authentication Failures"
    - "Software and Data Integrity Failures"
    - "Security Logging and Monitoring Failures"
    - "Server-Side Request Forgery"
  
  cwe_top_25:
    - CWE-787  # Out-of-bounds Write
    - CWE-79   # Cross-site Scripting
    - CWE-89   # SQL Injection
    - CWE-416  # Use After Free
    - CWE-78   # OS Command Injection
    - CWE-20   # Improper Input Validation
    - CWE-125  # Out-of-bounds Read
    - CWE-22   # Path Traversal
    - CWE-352  # Cross-Site Request Forgery
    - CWE-434  # Unrestricted Upload

# Severity Levels
severity:
  critical:
    score_range: [9.0, 10.0]
    priority: 1
  high:
    score_range: [7.0, 8.9]
    priority: 2
  medium:
    score_range: [4.0, 6.9]
    priority: 3
  low:
    score_range: [0.1, 3.9]
    priority: 4

# Detection Settings
detection:
  enable_static_analysis: true
  enable_dynamic_analysis: false  # Stage II
  enable_dependency_scan: true
  confidence_threshold: 0.7
  max_file_size_mb: 10

# Mitigation Settings
mitigation:
  suggest_fixes: true
  auto_generate_patches: false  # Stage II/III
  provide_code_examples: true

# Performance Settings
performance:
  max_workers: 4
  timeout_seconds: 300
  cache_enabled: true

# Output Settings
output:
  format: "excel"  # Options: excel, json, html, pdf
  excel_template: "config/output_template.xlsx"
  include_code_snippets: true
  max_snippet_lines: 10

# Reporting
reporting:
  include_cve_mapping: true
  include_cwe_mapping: true
  include_mitigation_steps: true
  explainability: true
  generate_summary: true

# Evaluation
evaluation:
  metrics:
    - precision
    - recall
    - f1_score
    - processing_time
  ground_truth_file: "data/ground_truth.json"

# Logging
logging:
  level: "INFO"  # Options: DEBUG, INFO, WARNING, ERROR
  file: "output/patchscout.log"
  console_output: true
