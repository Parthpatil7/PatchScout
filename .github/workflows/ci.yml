name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Static checks
        run: |
          python -m compileall src
          flake8 src/main.py src/analyzers/code_analyzer.py src/detectors/vulnerability_detector.py src/detectors/cve_mapper.py src/reporting/report_generator.py src/utils/dataset_loader.py tests --max-line-length=120 --extend-ignore=E203,W503

      - name: Run tests
        run: pytest -q

      - name: Artifact sanity checks
        run: |
          test -f README.md
          test -f config/config.yaml
